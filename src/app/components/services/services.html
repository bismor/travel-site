<section class="services container">
  <app-section-header align="center" subtitle="CATEGORY" title="We Offer Best Services" />

  <div class="services__container">
    @for (item of services; track item.id) {
      <div class="service-card">
        <img [src]="item.src" [alt]="item.alt" />
        <p class="service-card__title">{{ item.title }}</p>
        <p class="service-card__text">{{ item.text }}</p>
      </div>
    }
  </div>
</section>
